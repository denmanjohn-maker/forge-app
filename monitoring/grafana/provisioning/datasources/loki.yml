apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      # Derive trace IDs from log lines so Grafana can link logs → Tempo traces
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"TraceId"\s*:\s*"([a-f0-9]{32})"'
          name: TraceID
          url: "$${__value.raw}"
