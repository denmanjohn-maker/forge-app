name: Delete Stale Branches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete-branches:
    name: Delete all branches except main and staging
    runs-on: ubuntu-latest

    steps:
      - name: Delete stale branches
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const keep = new Set(['main', 'staging']);
            let failed = 0;

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const branch of branches) {
              if (keep.has(branch.name)) {
                console.log(`Keeping branch: ${branch.name}`);
                continue;
              }
              console.log(`Deleting branch: ${branch.name}`);
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch.name}`,
                });
              } catch (err) {
                console.error(`Failed to delete branch ${branch.name}: ${err.message}`);
                failed++;
              }
            }

            if (failed > 0) {
              core.setFailed(`${failed} branch(es) could not be deleted. Check the workflow logs for details on which branches failed.`);
            }
