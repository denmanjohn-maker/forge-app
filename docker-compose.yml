version: '3.8'

# Production Docker Compose — full stack with monitoring
# Usage: docker compose up -d --build
# Requires .env with: ADMIN_PASSWORD, JWT_SECRET, DATABASE_URL (optional)

services:
  # ─── MongoDB ───────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mtg-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: mtgdeckforge
    networks:
      - mtg-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── mtg-forge API ────────────────────────────────────────
  mtg-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mtg-deckforge-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MongoDb__ConnectionString: "${MONGODB_CONNECTION_STRING:-mongodb://mongodb:27017}"
      MongoDb__DatabaseName: "mtgdeckforge"
      MongoDb__DecksCollectionName: "decks"
      LOKI_URI: "http://loki:3100"
      # Traces (and the optional Serilog OTLP log sink) go here via gRPC.
      # Metrics are exported separately via the Prometheus scrape endpoint (/metrics).
      # Override via .env for Railway: OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy.railway.internal:4317
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4317}"
    depends_on:
      mongodb:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    networks:
      - mtg-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Grafana Tempo (distributed tracing) ──────────────────
  tempo:
    image: grafana/tempo:2.5.0
    container_name: mtg-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana queries here)
    networks:
      - mtg-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Loki ───────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: mtg-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - mtg-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: mtg-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"
    networks:
      - mtg-network
    depends_on:
      mtg-api:
        condition: service_healthy

  # ─── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: mtg-grafana
    restart: unless-stopped
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor traceToMetrics"
    ports:
      - "3000:3000"
    networks:
      - mtg-network
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  tempo_data:
    driver: local

networks:
  mtg-network:
    driver: bridge
