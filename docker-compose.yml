version: '3.8'

# AWS ECS Deployment
# Prerequisites:
#   - Image pushed to ECR via deploy/push-to-ecr.sh
#   - MongoDB Atlas connection string available
#   - Anthropic API key available
#
# Usage (Docker ECS context):
#   docker context create ecs myecs
#   docker compose --context myecs up
#
# Required environment variables (or set in a .env file):
#   ECR_REGISTRY    - AWS account ECR registry (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com)
#   ECR_REPOSITORY  - ECR repository name (e.g. mtg-deckforge)
#   IMAGE_TAG       - Image tag to deploy (default: latest)
#   ANTHROPIC_API_KEY       - Claude API key
#   MONGODB_CONNECTION_STRING - MongoDB Atlas connection string

services:
  mtg-api:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG:-latest}
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MongoDb__ConnectionString: "${MONGODB_CONNECTION_STRING}"
      MongoDb__DatabaseName: "mtgdeckforge"
      MongoDb__DecksCollectionName: "decks"
      ClaudeApi__ApiKey: "${ANTHROPIC_API_KEY}"
      ClaudeApi__Model: "claude-sonnet-4-20250514"
      ClaudeApi__MaxTokens: "8192"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: awslogs
      options:
        awslogs-group: /ecs/mtg-deckforge
        awslogs-region: ${AWS_REGION:-us-east-1}
        awslogs-stream-prefix: ecs
