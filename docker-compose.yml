version: '3.8'

# Production Docker Compose — full stack with monitoring
# Usage: docker compose up -d --build
# Requires .env with: ANTHROPIC_API_KEY, ADMIN_PASSWORD, JWT_SECRET, DATABASE_URL (optional)
# Optional .env keys: LLM_PROVIDER (Rag|Claude, default: Rag)

services:
  # ─── MongoDB ───────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mtg-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: mtgdeckforge
    networks:
      - mtg-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── MTG Deck Forge API ────────────────────────────────────
  mtg-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mtg-deckforge-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      LlmProvider: "${LLM_PROVIDER:-Rag}"
      MongoDb__ConnectionString: "${MONGODB_CONNECTION_STRING:-mongodb://mongodb:27017}"
      MongoDb__DatabaseName: "mtgdeckforge"
      MongoDb__DecksCollectionName: "decks"
      ClaudeApi__ApiKey: "${ANTHROPIC_API_KEY}"
      ClaudeApi__Model: "claude-sonnet-4-20250514"
      ClaudeApi__MaxTokens: "16384"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mtg-network

  # ─── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: mtg-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"
    networks:
      - mtg-network
    depends_on:
      - mtg-api

  # ─── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: mtg-grafana
    restart: unless-stopped
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    networks:
      - mtg-network
    depends_on:
      - prometheus

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  mtg-network:
    driver: bridge
