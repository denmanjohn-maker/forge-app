version: '3.8'

# Local development — just MongoDB. Run the API with `dotnet run` on your host.
# API on http://localhost:5001, MongoDB on port 27018

services:
  # ─── MongoDB ───────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mtg-mongodb-local
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data_local:/data/db
    environment:
      MONGO_INITDB_DATABASE: mtgdeckforge
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongo_data_local:
    driver: local
